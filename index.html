<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maxandre</title>
  <link rel="icon" href="images/avatar_Maxx.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- Mobile overlay (closes sidebar) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Burger button (mobile) -->
  <button id="burger" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>

  <!-- Language + theme toggles (mobile only, top-right) -->
  <div class="mobile-controls">
    <button id="mobile-theme-btn" class="mobile-lang-btn" aria-label="Toggle dark mode"><i class="fa-solid fa-sun"></i></button>
    <button id="mobile-lang-btn" class="mobile-lang-btn" aria-label="Toggle language">FR</button>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <nav id="sidebar-nav" aria-label="Main navigation">
      <a href="#home"       class="nav-link" data-page="home"       data-i18n="nav.home">Home</a>
      <a href="#projects"   class="nav-link" data-page="projects"   data-i18n="nav.projects">Projects</a>
      <a href="#skills"     class="nav-link" data-page="skills"     data-i18n="nav.skills">Skills</a>
      <a href="#experience" class="nav-link" data-page="experience" data-i18n="nav.experience">Experience</a>
      <a href="#education"  class="nav-link" data-page="education"  data-i18n="nav.education">Education</a>
      <a href="#contact"    class="nav-link" data-page="contact"    data-i18n="nav.contact">Contact</a>
    </nav>
    <div class="sidebar-footer">
      <div class="lang-switch" aria-label="Language switch">
        <span class="lang-label">FR</span>
        <label class="switch">
          <input id="lang-toggle" type="checkbox" aria-label="Toggle language (FR/EN)" />
          <span class="slider"></span>
        </label>
        <span class="lang-label">EN</span>
      </div>
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
        <i class="fa-solid fa-sun"></i>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main id="content">

    <!-- Home -->
    <section id="home" class="page active" role="main">
      <div class="home-inner">
        <h1 class="home-name" data-i18n="header.name">Maxandre</h1>
        <p class="home-bio"><span id="home-greeting"></span><span data-i18n="about.bioHtml"></span></p>
      </div>
      <div class="home-actions">
        <a class="btn" id="cv-button" href="assets/files/cv-maxandre.pdf" download data-i18n="home.cvButtonLabel">Download my resume</a>
      </div>
    </section>

    <!-- Skills -->
    <section id="skills" class="page">
      <div class="page-header">
        <h2 data-i18n="skills.title">Skills</h2>
      </div>
      <div class="skills-grid" id="skills-grid"></div>
    </section>

    <!-- Experience -->
    <section id="experience" class="page">
      <div class="page-header">
        <h2 data-i18n="experience.title">Experience</h2>
      </div>
      <div class="timeline" id="experience-timeline"></div>
    </section>

    <!-- Projects -->
    <section id="projects" class="page">
      <div class="page-header">
        <h2 data-i18n="nav.projects">Projects</h2>
      </div>
      <div class="projects-grid" id="projects-grid"></div>
    </section>

    <!-- Education -->
    <section id="education" class="page">
      <div class="page-header">
        <h2 data-i18n="education.title">Education</h2>
      </div>
      <div class="timeline" id="education-timeline"></div>
    </section>

    <!-- Contact -->
    <section id="contact" class="page">
      <div class="page-header">
        <h2 data-i18n="contact.title">Contact</h2>
      </div>
      <ul class="social-links">
        <li>
          <a href="https://github.com/Maxx-bl" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-github"></i> GitHub
          </a>
        </li>
        <li>
          <a href="https://linkedin.com/in/maxandre-bl" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-linkedin"></i> LinkedIn
          </a>
        </li>
      </ul>
      <ul class="contact-info">
        <li><i class="fa-solid fa-envelope"></i> <span data-i18n="contact.email">bl.maxandre@gmail.com</span></li>
      </ul>
      <div class="spoken-flags">
        <span class="spoken-label" data-i18n="contact.spokenLabel">Spoken languages:</span>
        <img src="images/fr.png" alt="French" height="24" />
        <img src="images/gb.png" alt="English" height="24" />
      </div>
    </section>

  </main>

  <!-- Project modal -->
  <div id="project-modal" class="modal-overlay" hidden>
    <div class="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <img id="modal-img" src="" alt="" class="modal-img" />
      <div class="modal-body">
        <div class="modal-year" id="modal-year"></div>
        <h3 class="modal-title" id="modal-title"></h3>
        <p class="modal-desc" id="modal-desc"></p>
        <ul class="modal-bullets" id="modal-bullets"></ul>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/i18n.js"></script>
</body>
</html>
