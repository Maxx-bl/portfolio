name: Build CV PDF

on:
  push:
    paths:
      - 'assets/i18n/content.json'
      - 'scripts/build-cv.js'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install XeLaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures

      - name: Install Public Sans fonts
        run: |
          sudo mkdir -p /usr/local/share/fonts/publicsans
          BASE="https://github.com/uswds/public-sans/raw/master/fonts/ttf"
          sudo curl -sL "$BASE/PublicSans-Regular.ttf"    -o /usr/local/share/fonts/publicsans/PublicSans-Regular.ttf
          sudo curl -sL "$BASE/PublicSans-Bold.ttf"       -o /usr/local/share/fonts/publicsans/PublicSans-Bold.ttf
          sudo curl -sL "$BASE/PublicSans-Italic.ttf"     -o /usr/local/share/fonts/publicsans/PublicSans-Italic.ttf
          sudo curl -sL "$BASE/PublicSans-BoldItalic.ttf" -o /usr/local/share/fonts/publicsans/PublicSans-BoldItalic.ttf
          sudo fc-cache -f

      - name: Build PDF
        run: node scripts/build-cv.js

      - name: Commit PDF
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/files/cv-maxandre.pdf
          git diff --cached --quiet || git commit -m "build: update cv-maxandre.pdf [skip ci]"
          git push
