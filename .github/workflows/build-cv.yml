name: Build CV PDF

on:
  push:
    paths:
      - 'assets/i18n/content.json'
      - 'scripts/build-cv.js'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pdfLaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-pictures \
            texlive-lang-french

      - name: Build PDF
        run: node scripts/build-cv.js

      - name: Commit PDF
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/files/cv-maxandre-fr.pdf assets/files/cv-maxandre-en.pdf
          git diff --cached --quiet || git commit -m "build: update CV PDFs [skip ci]"
          git push
